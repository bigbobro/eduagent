<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="800" height="600" rx="16" fill="#F8F9FA"/>

  <rect x="20" y="20" width="240" height="270" rx="16" fill="#FF6B6B" filter="url(#shadow)"/>
  <text x="140" y="140" text-anchor="middle" font-size="72">🚗</text>
  <text x="140" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">CAR</text>
  <text x="140" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.8)">小汽车</text>

  <rect x="280" y="20" width="240" height="270" rx="16" fill="#4ECDC4" filter="url(#shadow)"/>
  <text x="400" y="140" text-anchor="middle" font-size="72">🚌</text>
  <text x="400" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">BUS</text>
  <text x="400" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.8)">公交车</text>

  <rect x="540" y="20" width="240" height="270" rx="16" fill="#45B7D1" filter="url(#shadow)"/>
  <text x="660" y="140" text-anchor="middle" font-size="72">🚂</text>
  <text x="660" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">TRAIN</text>
  <text x="660" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.8)">火车</text>

  <rect x="20" y="310" width="240" height="270" rx="16" fill="#96CEB4" filter="url(#shadow)"/>
  <text x="140" y="430" text-anchor="middle" font-size="72">✈️</text>
  <text x="140" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">AIRPLANE</text>
  <text x="140" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.8)">飞机</text>

  <rect x="280" y="310" width="240" height="270" rx="16" fill="#FFEAA7" filter="url(#shadow)"/>
  <text x="400" y="430" text-anchor="middle" font-size="72">🚲</text>
  <text x="400" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">BICYCLE</text>
  <text x="400" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.8)">自行车</text>

  <rect x="540" y="310" width="240" height="270" rx="16" fill="#DDA0DD" filter="url(#shadow)"/>
  <text x="660" y="430" text-anchor="middle" font-size="72">⛵</text>
  <text x="660" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">BOAT</text>
  <text x="660" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.8)">船</text>
</svg>