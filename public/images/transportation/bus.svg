<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg_bus" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ECDC4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6EDDD6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="400" height="300" rx="20" fill="url(#bg_bus)"/>
  <text x="200" y="140" text-anchor="middle" font-size="100" filter="url(#shadow)">🚌</text>
  <text x="200" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" filter="url(#shadow)">BUS</text>
  <text x="200" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.8)">公交车</text>
</svg>