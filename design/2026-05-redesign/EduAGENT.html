<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<title>EduAGENT · 魔法学院重构</title>
<meta name="viewport" content="width=1480, initial-scale=1" />

<!-- Fonts: picture-book-feeling pairing -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=LXGW+WenKai+TC:wght@400;700&family=Fredoka:wght@400;500;600;700&family=Caveat:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root {
    --font-zh: 'LXGW WenKai TC', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
    --font-display: 'ZCOOL KuaiLe', 'LXGW WenKai TC', sans-serif;
    --font-en: 'Fredoka', sans-serif;
    --font-en-script: 'Caveat', cursive;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    background: #EFE3C8;
    font-family: var(--font-zh);
    color: #3D3326;
    -webkit-font-smoothing: antialiased;
  }
  #root { width: 100%; height: 100%; }
  .paper-bg { position: relative; overflow: hidden; }
  .paper-bg .paper-grain {
    position: absolute; inset: 0; pointer-events: none; mix-blend-mode: multiply; opacity: 0.7;
    background-image:
      radial-gradient(circle at 30% 20%, rgba(61,51,38,0.04), transparent 60%),
      radial-gradient(circle at 70% 80%, rgba(61,51,38,0.05), transparent 50%);
  }
  .paper-bg .paper-grain::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='2'/><feColorMatrix values='0 0 0 0 0.24  0 0 0 0 0.20  0 0 0 0 0.15  0 0 0 0.06 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    opacity: 0.7;
  }
  .paper-bg .paper-vignette {
    position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(143,118,79,0.18) 100%);
  }
  .paper-btn:active { transform: translate(2px, 2px); box-shadow: 1px 2px 0 #3D3326 !important; }

  kbd {
    font-family: var(--font-mono);
  }

  /* SVG defs container */
  svg[aria-hidden="true"] { width: 0; height: 0; position: absolute; }
</style>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

</head>
<body>
<div id="root"></div>

</html>
